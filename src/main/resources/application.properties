spring.application.name=HealthInsuranceClaimsManagement
server.port=8081
jwt.secret=MyHealthInsuranceSecretKeyForJwtAuthentication123456789
jwt.expiration=3600000

spring.datasource.url=jdbc:mysql://localhost:3306/health_insurance_db
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
spring.jackson.deserialization.fail-on-unknown-properties=true


file.upload-dir=uploads
# Multipart file upload configuration

spring.servlet.multipart.enabled=true

# Maximum size of one file
spring.servlet.multipart.max-file-size=10MB

# Maximum size of complete request (all files together)
spring.servlet.multipart.max-request-size=100MB
